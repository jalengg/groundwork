tile_size_px: 512
pixel_size_m: 5
n_tiles_per_city: 150
jitter_fraction: 0.3
style: us_suburb

cities:
  - name: arlington_tx
    query: "Arlington, Texas, USA"
    split: train
  - name: chandler_az
    query: "Chandler, Arizona, USA"
    split: train
  - name: gilbert_az
    query: "Gilbert, Arizona, USA"
    split: train
  - name: henderson_nv
    query: "Henderson, Nevada, USA"
    split: train
  - name: mesa_az
    query: "Mesa, Arizona, USA"
    split: train
  - name: tempe_az
    query: "Tempe, Arizona, USA"
    split: train
  - name: plano_tx
    query: "Plano, Texas, USA"
    split: train
  - name: irving_tx
    query: "Irving, Texas, USA"
    split: val          # held-out validation city
  # Terrain variation
  - name: bellevue_wa
    query: "Bellevue, Washington, USA"
    split: train
  - name: sandy_ut
    query: "Sandy, Utah, USA"
    split: train
  - name: beaverton_or
    query: "Beaverton, Oregon, USA"
    split: train
  - name: cranberry_township_pa
    query: "Cranberry Township, Pennsylvania, USA"
    split: train
  # Water / no-build interspersed
  - name: plymouth_mn
    query: "Plymouth, Minnesota, USA"
    split: train
  - name: kissimmee_fl
    query: "Kissimmee, Florida, USA"
    split: train
  - name: sugar_land_tx
    query: "Sugar Land, Texas, USA"
    split: train
  - name: virginia_beach_va
    query: "Virginia Beach, Virginia, USA"
    split: train
  # Coastal
  - name: carlsbad_ca
    query: "Carlsbad, California, USA"
    split: train
